name: Supabase Keep Alive

# Pings Supabase to prevent the free-tier project from auto-pausing after
# 7 days of inactivity. Hits a real table query so the database (not just
# PostgREST) registers as active.

on:
  schedule:
    # Every 2 days at 14:00 UTC (≈ 8 AM México). With a 7-day pause window
    # this gives 3 chances per window.
    - cron: '0 14 */2 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Anon key is intentionally public (it ships in the frontend bundle and
      # is gated by RLS). Override via repo secrets if you ever rotate it.
      SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://lccclwtwkegbvlpdwisu.supabase.co' }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjY2Nsd3R3a2VnYnZscGR3aXN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjQ1NjUsImV4cCI6MjA4OTc0MDU2NX0.-QhRRYwCfjSR8Z2f6-rmmTVXPF79h5qP-bdwHsR4Erw' }}

    steps:
      - name: Ping Supabase database
        shell: bash
        run: |
          set -uo pipefail

          BASE="${SUPABASE_URL%/}"

          ping() {
            local url="$1"
            local label="$2"
            local code body
            body=$(mktemp)
            code=$(curl --ipv4 -sS \
              --connect-timeout 10 --max-time 30 \
              -o "$body" -w "%{http_code}" \
              "$url" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" 2>/dev/null || echo "000")
            echo "[$label] HTTP $code"
            head -c 200 "$body" 2>/dev/null || true
            echo
            rm -f "$body"
            # 2xx/3xx/4xx all prove the server (and its DB) responded.
            # Only 5xx and 000 (network/DNS error) count as failures here.
            [[ "$code" =~ ^[234][0-9][0-9]$ ]]
          }

          attempt=0
          max=5
          while [ "$attempt" -lt "$max" ]; do
            attempt=$((attempt + 1))
            echo "::group::Attempt $attempt/$max"

            # Primary: real DB query (touches Postgres through PostgREST).
            if ping "$BASE/rest/v1/products?select=id&limit=1" "DB"; then
              echo "::endgroup::"
              echo "Supabase reachable — keepalive succeeded on attempt $attempt."
              exit 0
            fi

            # Fallback: REST root. Returns 401 but proves PostgREST is up.
            if ping "$BASE/rest/v1/" "REST-ROOT"; then
              echo "::endgroup::"
              echo "::warning::Primary DB query failed but REST root responded — server reachable."
              exit 0
            fi

            echo "::endgroup::"
            backoff=$((attempt * 10))
            echo "All endpoints failed on attempt $attempt; sleeping ${backoff}s before retry."
            sleep "$backoff"
          done

          echo "::error::Supabase keepalive failed after $max attempts."
          exit 1

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[keepalive] Supabase ping failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Scheduled Supabase keepalive failed.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `Possible causes:`,
              `- Project paused (visit https://supabase.com/dashboard/project/lccclwtwkegbvlpdwisu and resume).`,
              `- Anon key rotated (update the SUPABASE_ANON_KEY repo secret).`,
              `- GitHub-hosted runner DNS/network blip (re-run the workflow).`,
            ].join('\n');

            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'keepalive-failure',
              per_page: 1,
            });

            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['keepalive-failure'],
              });
            }
